<nav class="admin-pagination" aria-label="Phân trang kết quả">
  <p aria-live="polite">Hiển thị {{ firstResult }}–{{ lastResult }} trong {{ total }} kết quả</p>
  <label>
    Số dòng mỗi trang
    <select [value]="pageSize" (change)="changePageSize($event)">
      @for (size of pageSizes; track size) {
        <option [value]="size">{{ size }}</option>
      }
    </select>
  </label>
  <span>Trang {{ page }} / {{ totalPages }}</span>
  <button
    type="button"
    [disabled]="page <= 1"
    aria-label="Đến trang trước"
    (click)="goTo(page - 1)"
  >
    ‹
  </button>
  <button
    type="button"
    [disabled]="page >= totalPages"
    aria-label="Đến trang sau"
    (click)="goTo(page + 1)"
  >
    ›
  </button>
</nav>
