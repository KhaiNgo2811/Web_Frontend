@if (open()) {
  <div class="export-dialog-backdrop" (click)="cancel()"></div>
  <section class="export-dialog" role="dialog" aria-modal="true" aria-labelledby="export-dialog-title">
    <div class="export-dialog__header">
      <div class="export-dialog__icon">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </div>
      <div class="export-dialog__title">
        <h2 id="export-dialog-title">{{ options().title }}</h2>
        <p>{{ options().subtitle }}</p>
      </div>
      <button class="export-dialog__close" type="button" (click)="cancel()" aria-label="Đóng">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="export-dialog__body">
      <label class="export-field">
        <span class="export-field__label">Chọn khoảng thời gian</span>
        <select class="export-select" (change)="onRangeChange($event)">
          @for (range of options().timeRanges; track range.value) {
            <option [value]="range.value">{{ range.label }}</option>
          }
        </select>
      </label>
    </div>

    <div class="export-dialog__footer">
      <button class="btn btn-ghost" type="button" (click)="cancel()">Hủy</button>
      <button class="btn btn-success" type="button" (click)="confirm()">Xuất dữ liệu</button>
    </div>
  </section>
}
