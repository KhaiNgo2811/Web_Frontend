<span class="rating" [attr.aria-label]="value() + ' trên 5 sao'">
  @for (star of stars; track star) {
    <button
      type="button"
      [class.active]="star <= value()"
      [disabled]="readonly()"
      [attr.aria-label]="star + ' sao'"
      (click)="valueChange.emit(star)"
    >
      <i [class]="star <= value() ? 'bi bi-star-fill' : 'bi bi-star'" aria-hidden="true"></i>
    </button>
  }
</span>
